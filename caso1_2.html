<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Filtros de Pesquisa</title>
</head>
<body>

    <p>aceita pets :</p>
    <input type="checkbox" id="pets-sim"> <label for="pets-sim">sim</label>
    <input type="checkbox" id="pets-nao"> <label for="pets-nao">não</label>
    <input type="checkbox" id="pets-tanto"> <label for="pets-tanto">tanto faz</label>

    <p>academia :</p>
    <input type="checkbox" id="acad-sim"> <label for="acad-sim">sim</label>
    <input type="checkbox" id="acad-nao"> <label for="acad-nao">não</label>
    <input type="checkbox" id="acad-tanto"> <label for="acad-tanto">tanto faz</label>

    <p>próximo à estação de metrô/trem :</p>
    <input type="checkbox" id="trem-sim"> <label for="trem-sim">sim</label>
    <input type="checkbox" id="trem-nao"> <label for="trem-nao">não</label>
    <input type="checkbox" id="trem-tanto"> <label for="trem-tanto">tanto faz</label>

    <p>perfil de morador :</p>
    <input type="checkbox" id="perfil-intro"> <label for="perfil-intro">introvertido</label> <br>
    <input type="checkbox" id="perfil-extro"> <label for="perfil-extro">extrovertido</label> <br>
    <input type="checkbox" id="perfil-tanto"> <label for="perfil-tanto">tanto faz</label>

    <br><br>

    <table>
        <tr>
            <td>
                <button type="button">
                    <img src="back-arrow.png" alt="Voltar">
                    voltar
                </button>
            </td>
            <td>
                <button type="submit">
                    <img src="arrow.png" alt="Lupa">
                    pesquisar
                </button>
            </td>
        </tr>
    </table>

</body>
</html>
